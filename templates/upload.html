{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <div class="card shadow-lg p-4" style="border-radius: 1.2rem; background: rgba(255,255,255,0.95);">
                <h2 class="mb-4 text-center" style="color: #1b263b; font-weight: 700;">
                    <i class="bi bi-upload me-2" style="color:#415a77;"></i>Upload Resume
                </h2>
                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label" style="font-weight:600;">Select PDF Resume:</label>
                        <input type="file" name="resume" accept="application/pdf" class="form-control" required>
                    </div>
                    <div class="d-flex justify-content-between mt-4">
                        <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left"></i> Back
                        </a>
                        <button type="submit" class="btn btn-primary px-4" style="font-weight:600;">
                            <i class="bi bi-cloud-arrow-up me-1"></i>Upload
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
