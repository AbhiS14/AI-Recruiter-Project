{% extends "base.html" %}
{% block content %}
<div class="container py-5" style="background: rgba(255,255,255,0.85); border-radius: 1.2rem; box-shadow: 0 4px 32px rgba(65,90,119,0.07); backdrop-filter: blur(3px);">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <h2 class="mb-5 text-center" style="color: #1b263b; font-weight: 700; letter-spacing: 1px;">
                <i class="bi bi-briefcase-fill me-2" style="color:#415a77;"></i>Job Listings
            </h2>
            <div class="row g-4">
                {% for job in jobs %}
                <div class="col-md-6 col-lg-4">
                    <div class="card h-100 shadow border-0" style="border-radius: 1.1rem; background: rgba(255,255,255,0.97); transition: transform 0.2s;">
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title mb-2" style="color: #1b263b; font-weight: 600;">{{ job[1] }}</h5>
                            <p class="card-text mb-4" style="color: #415a77; min-height: 70px;">{{ job[2] }}</p>
                            <form method="POST" action="{{ url_for('apply_job', job_id=job[0]) }}" class="mt-auto">
                                <button type="submit" class="btn btn-success w-100 py-2" style="border-radius: 0.5rem; font-weight: 600; letter-spacing: 0.5px;">
                                    <i class="bi bi-send-fill me-1"></i>Apply
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
