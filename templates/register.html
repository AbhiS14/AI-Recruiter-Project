{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow-lg p-4" style="max-width: 420px; width: 100%; border-radius: 1.2rem; background: rgba(255,255,255,0.93);">
        <div class="text-center mb-4">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo"
                 style="height: 90px; margin-bottom: 10px; border-radius: 1.2rem; box-shadow: 0 4px 24px rgba(65,90,119,0.13); object-fit: contain;">
            <h2 class="mt-3 mb-0" style="font-family: 'Segoe UI', 'Roboto', Arial, sans-serif; font-weight:700; color:#1b263b;">Register</h2>
        </div>
        <form method="POST">
            <div class="form-group mb-3 text-start">
                <label class="mb-1" style="font-weight: 500; color: #415a77;">Name</label>
                <input name="name" type="text" class="form-control w-100" required style="border-radius: 0.5rem;">
            </div>
            <div class="form-group mb-3 text-start">
                <label class="mb-1" style="font-weight: 500; color: #415a77;">Email</label>
                <input name="email" type="email" class="form-control w-100" required style="border-radius: 0.5rem;">
            </div>
            <div class="form-group mb-3 text-start">
                <label class="mb-1" style="font-weight: 500; color: #415a77;">Password</label>
                <input name="password" type="password" class="form-control w-100" required style="border-radius: 0.5rem;">
            </div>
            <div class="form-group mb-4 text-start">
                <label class="mb-1" style="font-weight: 500; color: #415a77;">Role</label>
                <select name="role" class="form-control w-100" required style="border-radius: 0.5rem;">
                    <option value="" disabled selected>Select your role</option>
                    <option value="candidate">Candidate</option>
                    <option value="recruiter">Recruiter</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary w-100" style="background: linear-gradient(90deg, #415a77 0%, #1b263b 100%); border: none; border-radius: 0.5rem; font-weight: 600;">Register</button>
            <p class="mt-4 text-center" style="font-size: 1.05em;">Already have an account? <a href="{{ url_for('login') }}" style="color: #415a77;">Login</a></p>
        </form>
    </div>
</div>
{% endblock %}
